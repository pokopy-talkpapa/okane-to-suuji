<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>あさかつ スタンプカード</title>
<style>
  :root {
    --bg: #f7f7f7;
    --panel: #ffffff;
    --shadow: 0 8px 20px rgba(0,0,0,.10);
    --radius: 16px;
    --dark: #111;
    --ok: #0f8a2b;
    --ng: #e0453a;
    --stamp: #e0453a;      /* はんこの色（あか） */
    --today: #1565c0;
  }
  * { box-sizing: border-box; touch-action: manipulation; }
  html { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100%;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 12px; }
  .panel {
    background: var(--panel);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 12px 20px;
  }

  /* タイトル行 */
  .titleRow { position:relative; min-height:44px; margin-bottom:14px; }
  .title { font-weight:950; font-size:18px; margin:0; text-align:center; line-height:44px; padding:0 52px; }
  .soundBtn {
    position:absolute; right:0; top:0;
    border:0; border-radius:14px;
    display:inline-flex; align-items:center; justify-content:center;
    width:44px; height:44px; font-size:20px;
    cursor:pointer; background:#f1f1f1; color:var(--dark); line-height:1;
  }
  .soundBtn.off { background:#e9e9e9; color:#666; }

  /* ===== あいことば入力画面 ===== */
  .passScreen { display:flex; flex-direction:column; align-items:center; gap:16px; padding:20px 10px 30px; }
  .passMsg { margin:0; font-size:1.05rem; font-weight:700; color:#555; text-align:center; }
  .passInput {
    width:100%; max-width:280px; text-align:center;
    font-size:1.6rem; font-weight:900; letter-spacing:.12em;
    padding:12px 14px; border:2px solid #ddd; border-radius:14px;
    outline:none;
  }
  .passInput:focus { border-color:var(--today); }
  .bigBtn {
    border:0; border-radius:16px; font-weight:950; cursor:pointer;
    padding:16px 28px; font-size:18px; color:#fff; background:var(--ok);
    box-shadow:0 4px 12px rgba(0,0,0,.15); transition:transform .1s;
  }
  .bigBtn:active { transform:scale(.97); }
  .passError { color:var(--ng); font-weight:800; min-height:1.4em; margin:0; }
  .passHint { color:#999; font-size:.8rem; text-align:center; margin:0; }

  /* ===== カード画面 ===== */
  .cardScreen { display:none; }
  .cardScreen.active { display:block; }

  .nameRow { display:flex; align-items:baseline; justify-content:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
  .nameRow .name { font-size:1.5rem; font-weight:950; }
  .nameRow .san { font-size:1rem; color:#666; font-weight:800; }

  /* 進捗 */
  .progress { text-align:center; margin:4px 0 8px; }
  .progress .count { font-size:2.2rem; font-weight:950; color:var(--ok); line-height:1; }
  .progress .of { font-size:1rem; color:#999; font-weight:800; }
  .nextBadge { text-align:center; font-size:.95rem; font-weight:800; color:#777; margin:0 0 10px; min-height:1.3em; }
  .nextBadge b { color:var(--dark); }

  /* 獲得バッジ */
  .badges { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin:0 0 14px; min-height:8px; }
  .badge {
    display:inline-flex; align-items:center; gap:4px;
    background:#f2f8f2; border:1.5px solid #cfe6cf; border-radius:999px;
    padding:5px 12px 5px 8px; font-weight:900; font-size:.9rem; color:#2e7d32;
  }
  .badge .em { font-size:1.15rem; }

  /* マス目カレンダー */
  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(58px, 1fr));
    gap:8px;
  }
  .day {
    position:relative; aspect-ratio:1/1;
    background:#fafafa; border:2px solid #eee; border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .day .date { position:absolute; top:4px; left:0; right:0; text-align:center; font-size:.62rem; font-weight:800; color:#bbb; }
  .day .num  { font-size:1.35rem; font-weight:900; color:#dcdcdc; margin-top:6px; }
  .day.today { border-color:var(--today); box-shadow:0 0 0 2px rgba(21,101,192,.15) inset; }
  .day.today .date { color:var(--today); }

  /* はんこ（押された日） */
  .hanko {
    margin-top:6px; width:70%; aspect-ratio:1/1; border-radius:50%;
    border:2.5px solid var(--stamp); color:var(--stamp);
    display:flex; align-items:center; justify-content:center;
    font-size:1.35rem; line-height:1;
    transform:rotate(-9deg);
    box-shadow:0 1px 0 rgba(224,69,58,.25);
  }
  .day.stamped { background:#fff6f5; border-color:#f6cfca; }
  .day.stamped .num { display:none; }

  /* ポン！と押される演出 */
  @keyframes stampPress {
    0%   { transform:rotate(-9deg) scale(2.4); opacity:0; }
    55%  { transform:rotate(-9deg) scale(.86); opacity:1; }
    75%  { transform:rotate(-9deg) scale(1.08); }
    100% { transform:rotate(-9deg) scale(1); }
  }
  .hanko.press { animation:stampPress .5s cubic-bezier(.2,.7,.3,1) both; }

  /* バッジ獲得の一言 */
  .toast {
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--dark); color:#fff; font-weight:900; font-size:1rem;
    padding:12px 20px; border-radius:999px; box-shadow:0 8px 24px rgba(0,0,0,.25);
    opacity:0; pointer-events:none; transition:opacity .3s, transform .3s; z-index:20;
    display:flex; align-items:center; gap:8px;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .footRow { display:flex; justify-content:center; margin-top:18px; }
  .textBtn { border:0; background:transparent; color:#aaa; font-size:.85rem; font-weight:800; cursor:pointer; text-decoration:underline; }

  .loading, .cardError { text-align:center; color:#999; font-weight:800; padding:30px 10px; }
  .cardError { color:var(--ng); }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="titleRow">
      <h1 class="title" id="cardTitle">あさかつ スタンプカード</h1>
      <button class="soundBtn" id="soundBtn" type="button" aria-label="おと">
        <span id="soundIcon">🔊</span>
      </button>
    </div>

    <!-- あいことば入力 -->
    <div class="passScreen" id="passScreen">
      <p class="passMsg">あいことばを いれてね</p>
      <input class="passInput" id="passInput" type="text" inputmode="text"
             autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="ひらがな">
      <p class="passError" id="passError"></p>
      <button class="bigBtn" id="passBtn" type="button">カードを ひらく</button>
      <p class="passHint">じぶんの あいことばが わからないときは おうちの人に きいてね</p>
    </div>

    <!-- カード -->
    <div class="cardScreen" id="cardScreen">
      <div class="loading" id="cardLoading">よみこみちゅう…</div>
      <div class="cardError" id="cardErrorBox" style="display:none;"></div>
      <div id="cardBody" style="display:none;">
        <div class="nameRow"><span class="name" id="childName"></span><span class="san">の カード</span></div>
        <div class="progress"><span class="count" id="stampCount">0</span><span class="of" id="stampOf"> / 0</span></div>
        <p class="nextBadge" id="nextBadge"></p>
        <div class="badges" id="badges"></div>
        <div class="grid" id="grid"></div>
        <div class="footRow"><button class="textBtn" id="switchBtn" type="button">べつの人の カード</button></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="stamp-logic.js"></script>
<script>
  // ====== 設定 ======
  // ↓ デプロイした GAS ウェブアプリの URL に書きかえてください（SETUP.md 参照）。
  //   書きかえない間や ?demo=1 のときは、サンプルデータで動作を確認できます。
  var GAS_URL = 'ここにGASのURLをはりつける';

  var params = new URLSearchParams(location.search);
  var DEMO = params.get('demo') === '1' || GAS_URL.indexOf('http') !== 0;

  // ====== サウンド（本体ゲームと同じ仕組み）======
  var soundOn = localStorage.getItem('okaneToSuujiSoundOn') !== 'off';
  var audioCtx = null, _successBuf = null, _pendingAB = null;
  fetch('../sounds/coins-success.mp3').then(function (r) { return r.arrayBuffer(); }).then(function (ab) {
    if (audioCtx) audioCtx.decodeAudioData(ab).then(function (b) { _successBuf = b; }).catch(function(){});
    else _pendingAB = ab;
  }).catch(function(){});

  function getCtx() {
    var Cls = window.AudioContext || window.webkitAudioContext;
    if (!Cls) return null;
    if (!audioCtx) {
      audioCtx = new Cls();
      if (_pendingAB) { audioCtx.decodeAudioData(_pendingAB).then(function (b) { _successBuf = b; }).catch(function(){}); _pendingAB = null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playPon() {
    if (!soundOn) return;
    var ctx = getCtx(); if (!ctx) return;
    var now = ctx.currentTime;
    [[520, 0.05], [880, 0.035]].forEach(function (pair, i) {
      var o = ctx.createOscillator(), a = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(pair[0], now + i * 0.02);
      o.frequency.exponentialRampToValueAtTime(pair[0] * 1.8, now + 0.09);
      a.gain.setValueAtTime(pair[1], now + i * 0.02);
      a.gain.exponentialRampToValueAtTime(0.0001, now + 0.16);
      o.connect(a); a.connect(ctx.destination);
      o.start(now + i * 0.02); o.stop(now + 0.2);
    });
  }
  function playSuccess() {
    if (!soundOn) return;
    var ctx = getCtx(); if (!ctx) return;
    if (_successBuf) {
      var src = ctx.createBufferSource(); src.buffer = _successBuf;
      var g = ctx.createGain(); var t = ctx.currentTime;
      g.gain.setValueAtTime(0.75, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
      src.connect(g); g.connect(ctx.destination);
      src.start(t, 0); src.stop(t + 1.5);
    } else {
      playPon();
    }
  }
  function updateSoundBtn() {
    document.getElementById('soundBtn').classList.toggle('off', !soundOn);
    document.getElementById('soundIcon').textContent = soundOn ? '🔊' : '🔇';
  }
  document.getElementById('soundBtn').addEventListener('click', function () {
    soundOn = !soundOn;
    localStorage.setItem('okaneToSuujiSoundOn', soundOn ? 'on' : 'off');
    updateSoundBtn();
  });
  updateSoundBtn();

  // ====== 通信 ======
  function fetchCard(pass) {
    if (DEMO) return Promise.resolve(demoCard(pass));
    var url = GAS_URL + '?action=card&pass=' + encodeURIComponent(pass);
    return fetch(url).then(function (r) { return r.json(); });
  }

  // サンプルデータ（GAS 未接続でも見た目を確認できる）
  function demoCard(pass) {
    var today = new Date();
    var start = new Date(today); start.setDate(start.getDate() - 9);
    var end = new Date(today); end.setDate(end.getDate() + 20);
    var startKey = STAMP.dateKey(start), endKey = STAMP.dateKey(end);
    var range = STAMP.enumerateDates(startKey, endKey);
    // きのうまでの日を何個か押しておく（きょうは管理者がまだ押していない想定）
    var stamps = range.slice(0, 8).filter(function (_, i) { return i % 3 !== 2; });
    return { ok: true, title: 'あさかつ スタンプカード', start: startKey, end: endKey,
             name: (pass ? pass + 'ちゃん' : 'さんぷる'), stamps: stamps };
  }

  // ====== 画面 ======
  var savedPass = localStorage.getItem('okaneToSuujiStampPass') || '';
  var urlPass = params.get('pass');
  var currentPass = '';

  function seenKey(pass) { return 'okaneToSuujiStamp:seen:' + pass; }
  function getSeen(pass) {
    try { return JSON.parse(localStorage.getItem(seenKey(pass)) || '[]'); } catch (e) { return []; }
  }
  function setSeen(pass, keys) {
    localStorage.setItem(seenKey(pass), JSON.stringify(keys));
  }

  function showPassScreen() {
    document.getElementById('passScreen').style.display = '';
    document.getElementById('cardScreen').classList.remove('active');
    document.getElementById('passError').textContent = '';
    document.getElementById('passInput').value = '';
    setTimeout(function () { document.getElementById('passInput').focus(); }, 50);
  }

  function openCard(pass) {
    currentPass = pass;
    document.getElementById('passScreen').style.display = 'none';
    var cs = document.getElementById('cardScreen');
    cs.classList.add('active');
    document.getElementById('cardLoading').style.display = '';
    document.getElementById('cardBody').style.display = 'none';
    document.getElementById('cardErrorBox').style.display = 'none';

    fetchCard(pass).then(function (data) {
      if (!data || !data.ok) {
        // あいことばが違う → 入力画面にもどす
        localStorage.removeItem('okaneToSuujiStampPass');
        showPassScreen();
        document.getElementById('passError').textContent = (data && data.error) || 'あいことばが ちがうみたい';
        return;
      }
      localStorage.setItem('okaneToSuujiStampPass', pass);
      renderCard(data);
    }).catch(function () {
      document.getElementById('cardLoading').style.display = 'none';
      var box = document.getElementById('cardErrorBox');
      box.style.display = '';
      box.textContent = 'つうしんに しっぱいしました。じかんを おいて もういちど ひらいてね。';
    });
  }

  function renderCard(data) {
    document.getElementById('cardLoading').style.display = 'none';
    document.getElementById('cardBody').style.display = '';
    document.getElementById('cardTitle').textContent = data.title || 'あさかつ スタンプカード';
    document.getElementById('childName').textContent = data.name || '';

    var range = STAMP.enumerateDates(data.start, data.end);
    var inRange = {}; range.forEach(function (k) { inRange[k] = true; });
    var stampSet = {}; (data.stamps || []).forEach(function (k) { if (inRange[k]) stampSet[k] = true; });
    var stampKeys = Object.keys(stampSet);
    var count = stampKeys.length;

    // 進捗・次のバッジ
    document.getElementById('stampCount').textContent = count;
    document.getElementById('stampOf').textContent = ' / ' + range.length;
    var nb = STAMP.nextBadge(count);
    document.getElementById('nextBadge').innerHTML = nb
      ? ('あと <b>' + (nb.count - count) + '</b> こで ' + nb.emoji + ' ' + nb.label)
      : 'ぜんぶ そろったね！すごい！🎉';

    // 獲得バッジ
    var badgesEl = document.getElementById('badges');
    badgesEl.innerHTML = '';
    STAMP.earnedBadges(count).forEach(function (b) {
      var el = document.createElement('span');
      el.className = 'badge';
      el.innerHTML = '<span class="em">' + b.emoji + '</span>' + b.label;
      badgesEl.appendChild(el);
    });

    // 新しく増えたスタンプ（前回みた状態との差分）
    var seen = getSeen(currentPass);
    var fresh = {}; STAMP.newlyAdded(seen, stampKeys).forEach(function (k) { fresh[k] = true; });

    // マス目
    var todayKey = STAMP.dateKey(new Date());
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    range.forEach(function (key) {
      var p = STAMP.parseKey(key);
      var cell = document.createElement('div');
      cell.className = 'day';
      if (key === todayKey) cell.className += ' today';
      var dateEl = document.createElement('div');
      dateEl.className = 'date';
      dateEl.textContent = p.m + '/' + p.d;
      cell.appendChild(dateEl);

      if (stampSet[key]) {
        cell.className += ' stamped';
        var h = document.createElement('div');
        h.className = 'hanko';
        h.textContent = '☀';
        if (fresh[key]) h.className += ' press';
        cell.appendChild(h);
      } else {
        var num = document.createElement('div');
        num.className = 'num';
        num.textContent = p.d;
        cell.appendChild(num);
      }
      grid.appendChild(cell);
    });

    // 演出：新しいスタンプがあれば音＋トースト
    var freshCount = Object.keys(fresh).length;
    if (freshCount > 0) {
      playSuccess();
      var earnedNow = STAMP.latestBadge(count);
      var earnedBefore = STAMP.latestBadge(count - freshCount);
      if (earnedNow && (!earnedBefore || earnedBefore.count !== earnedNow.count)) {
        showToast(earnedNow.emoji + ' ' + earnedNow.label + ' バッジ ゲット！');
      } else {
        showToast('スタンプ ' + freshCount + 'こ ふえたよ！');
      }
    }

    setSeen(currentPass, stampKeys);
  }

  var toastTimer = null;
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2600);
  }

  // ====== イベント ======
  function submitPass() {
    var v = document.getElementById('passInput').value.trim();
    if (!v) { document.getElementById('passError').textContent = 'あいことばを いれてね'; return; }
    openCard(v);
  }
  document.getElementById('passBtn').addEventListener('click', submitPass);
  document.getElementById('passInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submitPass();
  });
  document.getElementById('switchBtn').addEventListener('click', function () {
    localStorage.removeItem('okaneToSuujiStampPass');
    currentPass = '';
    showPassScreen();
  });

  // ====== 起動 ======
  var startPass = urlPass || savedPass;
  if (startPass) openCard(startPass);
  else showPassScreen();
</script>
</body>
</html>
